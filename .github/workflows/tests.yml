name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    name: pytest on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
          - macos-15
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Linux Qt runtime dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-3 \
            libegl1 \
            libgl1 \
            libopengl0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0

      - name: Install dependencies
        run: uv sync --python 3.14 --group dev --locked

      - name: Run tests
        env:
          QT_API: pyside6
          QT_QPA_PLATFORM: offscreen
          MPLCONFIGDIR: ${{ runner.temp }}/matplotlib
        run: uv run --locked pytest
