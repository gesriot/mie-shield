name: Build release artifacts

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to update"
        required: true
        default: "v1.0.1"
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    name: macOS DMG
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Build DMG
        run: ./scripts/package-macos.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: mie-shield-macos
          path: dist/*.dmg
          if-no-files-found: error

  windows:
    name: Windows EXE
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Build Windows EXE
        shell: pwsh
        run: ./scripts/package-windows.ps1 -Mode onefile -Lto yes

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: mie-shield-windows-exe
          path: dist/windows/MieShield.exe
          if-no-files-found: error

  linux:
    name: Linux tarball
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Linux Qt runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-3 \
            libegl1 \
            libgl1 \
            libopengl0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0

      - name: Build Linux tarball
        run: ./scripts/package-linux.sh

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: mie-shield-linux
          path: dist/*linux*.tar.gz
          if-no-files-found: error

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - macos
      - windows
      - linux
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          body_path: docs/release-notes-v1.0.1.md
          files: release-assets/**/*
          overwrite_files: true
          fail_on_unmatched_files: true
